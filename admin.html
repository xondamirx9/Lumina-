<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Lumina Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;color:#f5f0eb;font-family:'Outfit',sans-serif;font-weight:300;min-height:100vh}
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap');
header{background:#0a0a0a;border-bottom:1px solid rgba(255,255,255,0.08);padding:1.2rem 2rem;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.1rem;letter-spacing:0.2em;color:#c9a96e}
.badge{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;background:rgba(201,169,110,0.1);border:1px solid rgba(201,169,110,0.3);color:#c9a96e;padding:0.3rem 0.8rem;border-radius:100px}
.tabs{display:flex;gap:0.5rem;padding:1.5rem 2rem 0}
.tab{padding:0.6rem 1.4rem;border-radius:100px 100px 0 0;font-size:0.75rem;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;border:1px solid rgba(255,255,255,0.08);border-bottom:none;background:rgba(255,255,255,0.02);color:rgba(245,240,235,0.4);transition:all 0.3s}
.tab.active{background:#0a0a0a;color:#c9a96e;border-color:rgba(201,169,110,0.3)}
.panel{display:none;padding:0 2rem 2rem}
.panel.active{display:block}
.stats-row{display:flex;gap:1rem;margin:1.5rem 0}
.stat-box{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:1rem 1.5rem;flex:1;text-align:center}
.stat-box .num{font-size:2rem;color:#c9a96e;font-weight:300}
.stat-box .label{font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(245,240,235,0.4);margin-top:0.3rem}
table{width:100%;border-collapse:collapse;font-size:0.82rem}
thead tr{background:rgba(201,169,110,0.05);border-bottom:1px solid rgba(255,255,255,0.08)}
th{padding:0.8rem 1rem;text-align:left;font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(201,169,110,0.7);font-weight:400}
td{padding:0.9rem 1rem;border-bottom:1px solid rgba(255,255,255,0.04);color:rgba(245,240,235,0.75);vertical-align:top}
tr:hover td{background:rgba(255,255,255,0.02)}
.chip{display:inline-block;padding:0.2rem 0.6rem;border-radius:100px;font-size:0.65rem;letter-spacing:0.1em;background:rgba(201,169,110,0.1);border:1px solid rgba(201,169,110,0.25);color:#c9a96e}
.empty{text-align:center;padding:4rem 2rem;color:rgba(245,240,235,0.2);font-size:0.85rem}
.refresh{padding:0.5rem 1.2rem;background:rgba(201,169,110,0.1);border:1px solid rgba(201,169,110,0.3);border-radius:100px;font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:#c9a96e;cursor:pointer;transition:all 0.3s}
.refresh:hover{background:rgba(201,169,110,0.2)}
#login-screen{position:fixed;inset:0;background:#050505;display:flex;align-items:center;justify-content:center;z-index:100}
.login-box{background:#0a0a0a;border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:2.5rem;width:100%;max-width:380px;text-align:center}
.login-box h2{font-size:1.6rem;font-weight:300;margin-bottom:0.5rem;color:#c9a96e}
.login-box p{font-size:0.8rem;color:rgba(245,240,235,0.4);margin-bottom:2rem}
.login-box input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:0.85rem 1rem;font-size:0.88rem;color:#f5f0eb;outline:none;margin-bottom:1rem;font-family:inherit}
.login-box button{width:100%;padding:0.85rem;background:#c9a96e;color:#050505;border-radius:10px;font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;font-weight:500;cursor:pointer;border:none;font-family:inherit}
.login-box .err{font-size:0.75rem;color:#f87171;min-height:1em;margin-bottom:0.5rem}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h2>Admin</h2>
    <p>Lumina Voyages — Secure Access</p>
    <input type="password" id="pwd" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')login()"/>
    <div class="err" id="login-err"></div>
    <button onclick="login()">Sign In</button>
  </div>
</div>

<header>
  <span class="logo">LUMINA VOYAGES</span>
  <div style="display:flex;align-items:center;gap:1rem">
    <button class="refresh" onclick="loadAll()">↻ Refresh</button>
    <span class="badge">Admin</span>
    <button class="refresh" onclick="logout()" style="border-color:rgba(248,113,113,0.3);color:#f87171;background:rgba(248,113,113,0.05)">Sign Out</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('inquiries')">Inquiries</div>
  <div class="tab" onclick="switchTab('newsletter')">Newsletter</div>
</div>

<div id="tab-inquiries" class="panel active">
  <div class="stats-row">
    <div class="stat-box"><div class="num" id="inq-count">—</div><div class="label">Total Inquiries</div></div>
    <div class="stat-box"><div class="num" id="inq-today">—</div><div class="label">Today</div></div>
    <div class="stat-box"><div class="num" id="inq-week">—</div><div class="label">This Week</div></div>
  </div>
  <table>
    <thead><tr>
      <th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>Destination</th>
      <th>Dates</th><th>Guests</th><th>Budget</th><th>Message</th><th>Lang</th><th>Date</th>
    </tr></thead>
    <tbody id="inq-body"></tbody>
  </table>
</div>

<div id="tab-newsletter" class="panel">
  <div class="stats-row">
    <div class="stat-box"><div class="num" id="nl-count">—</div><div class="label">Subscribers</div></div>
    <div class="stat-box"><div class="num" id="nl-en">—</div><div class="label">English</div></div>
    <div class="stat-box"><div class="num" id="nl-ru">—</div><div class="label">Russian</div></div>
    <div class="stat-box"><div class="num" id="nl-uz">—</div><div class="label">Uzbek</div></div>
  </div>
  <table>
    <thead><tr><th>#</th><th>Email</th><th>Language</th><th>Subscribed</th></tr></thead>
    <tbody id="nl-body"></tbody>
  </table>
</div>

<script>
const ADMIN_PASSWORD = 'lumina2026';
let token = sessionStorage.getItem('lumina_admin');

function login() {
  const pwd = document.getElementById('pwd').value;
  if (pwd === ADMIN_PASSWORD) {
    sessionStorage.setItem('lumina_admin', '1');
    token = '1';
    document.getElementById('login-screen').style.display = 'none';
    loadAll();
  } else {
    document.getElementById('login-err').textContent = 'Incorrect password';
    document.getElementById('pwd').value = '';
  }
}

function logout() {
  sessionStorage.removeItem('lumina_admin');
  location.reload();
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['inquiries','newsletter'][i] === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

function fmt(dt) {
  if (!dt) return '—';
  return new Date(dt).toLocaleString('en-GB', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

function esc(s) {
  if (!s) return '—';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function loadAll() {
  await Promise.all([loadInquiries(), loadNewsletter()]);
}

async function loadInquiries() {
  try {
    const res = await fetch('/api/admin/inquiries');
    const data = await res.json();
    document.getElementById('inq-count').textContent = data.length;
    const today = new Date().toISOString().slice(0,10);
    const weekAgo = new Date(Date.now()-7*86400000).toISOString();
    document.getElementById('inq-today').textContent = data.filter(r => r.created && r.created.startsWith(today)).length;
    document.getElementById('inq-week').textContent = data.filter(r => r.created && r.created >= weekAgo).length;
    const tbody = document.getElementById('inq-body');
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="11" class="empty">No inquiries yet</td></tr>'; return; }
    tbody.innerHTML = data.map(r => `<tr>
      <td>${r.id}</td>
      <td><strong>${esc(r.name)}</strong></td>
      <td><a href="mailto:${esc(r.email)}" style="color:#c9a96e">${esc(r.email)}</a></td>
      <td>${esc(r.phone)}</td>
      <td>${r.dest ? '<span class="chip">'+esc(r.dest)+'</span>' : '—'}</td>
      <td style="white-space:nowrap">${r.date_from ? esc(r.date_from)+' → '+(r.date_to||'?') : '—'}</td>
      <td>${r.guests||1}</td>
      <td>${esc(r.budget)}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(r.message)}">${esc(r.message)}</td>
      <td><span class="chip">${esc(r.lang)}</span></td>
      <td style="white-space:nowrap;font-size:0.75rem;color:rgba(245,240,235,0.3)">${fmt(r.created)}</td>
    </tr>`).join('');
  } catch(e) { console.error(e); }
}

async function loadNewsletter() {
  try {
    const res = await fetch('/api/admin/newsletter');
    const data = await res.json();
    document.getElementById('nl-count').textContent = data.length;
    document.getElementById('nl-en').textContent = data.filter(r=>r.lang==='en').length;
    document.getElementById('nl-ru').textContent = data.filter(r=>r.lang==='ru').length;
    document.getElementById('nl-uz').textContent = data.filter(r=>r.lang==='uz').length;
    const tbody = document.getElementById('nl-body');
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="4" class="empty">No subscribers yet</td></tr>'; return; }
    tbody.innerHTML = data.map(r => `<tr>
      <td>${r.id}</td>
      <td><a href="mailto:${esc(r.email)}" style="color:#c9a96e">${esc(r.email)}</a></td>
      <td><span class="chip">${esc(r.lang)}</span></td>
      <td style="font-size:0.75rem;color:rgba(245,240,235,0.3)">${fmt(r.created)}</td>
    </tr>`).join('');
  } catch(e) { console.error(e); }
}

if (token) {
  document.getElementById('login-screen').style.display = 'none';
  loadAll();
}
</script>
</body>
</html>
